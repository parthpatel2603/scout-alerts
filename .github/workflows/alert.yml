name: Pocket Agent Listing Alert

on:
  schedule:
    - cron: "0 */2 * * *"     # every 2 hours (UTC) — gives the 6h/50 logic room to fire
  workflow_dispatch:          # lets you run it manually from the Actions tab too

permissions:
  contents: write             # needed to commit the updated seen.json back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python monitor.py

      - name: Save state
        run: |
          git config user.name "pocket-agent-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json || true
          git commit -m "update seen listings [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"

