name: Scout Listing Alert

on:
  schedule:
    - cron: "0 */2 * * *"     # every 2 hours (UTC); the 6h/50 rule decides when to email
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          SCOUT_URL: ${{ secrets.SCOUT_URL }}
        run: python monitor.py

      - name: Publish state + data for Scout
        run: |
          git config user.name "scout-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json watch.json market.json || true
          git commit -m "scout: update tracking + market data [skip ci]" || echo "nothing to commit"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"
